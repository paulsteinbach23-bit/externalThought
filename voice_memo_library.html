<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMO — Voice Library</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --border-bright: #3d3d50;
    --text: #e8e8f0;
    --text-dim: #7a7a95;
    --text-muted: #44445a;
    --accent-a: #4fffb0;
    --accent-b: #4fb8ff;
    --accent-c: #ff8c4f;
    --accent-rec: #ff4f6a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--text);
  }
  .logo span { color: var(--accent-a); }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    padding: 0 18px 8px;
    text-transform: uppercase;
  }

  .path-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
  }

  .path-btn:hover { background: var(--surface2); color: var(--text); }

  .path-btn.active {
    background: var(--surface2);
    color: var(--text);
  }

  .path-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-a { background: var(--accent-a); }
  .dot-b { background: var(--accent-b); }
  .dot-c { background: var(--accent-c); }
  .dot-all { background: var(--text-muted); }

  .path-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* RECORD SECTION */
  .record-zone {
    padding: 18px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .record-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--border-bright);
    background: var(--surface2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.15s;
  }

  .record-btn:hover {
    border-color: var(--accent-rec);
    color: var(--accent-rec);
    background: #1a1015;
  }

  .record-btn.recording {
    border-color: var(--accent-rec);
    background: #1a1015;
    color: var(--accent-rec);
    animation: pulse-border 1.5s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,79,106,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(255,79,106,0); }
  }

  .rec-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-rec);
  }

  .recording .rec-indicator { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* MAIN CONTENT */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .main-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .main-title .badge {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
  }

  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { border-color: var(--border-bright); }

  /* ENTRIES */
  .entries {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .entries::-webkit-scrollbar { width: 4px; }
  .entries::-webkit-scrollbar-track { background: transparent; }
  .entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .date-group-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: start;
  }

  .entry-card:hover {
    border-color: var(--border-bright);
    background: var(--surface2);
  }

  .entry-card.open {
    border-color: var(--border-bright);
  }

  .entry-path-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 3px;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .tag-a { background: rgba(79,255,176,0.1); color: var(--accent-a); }
  .tag-b { background: rgba(79,184,255,0.1); color: var(--accent-b); }
  .tag-c { background: rgba(255,140,79,0.1); color: var(--accent-c); }

  .entry-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .entry-preview {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .entry-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
  }

  .entry-expand {
    grid-column: 1 / -1;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    white-space: pre-wrap;
  }

  .entry-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-small {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-small:hover { border-color: var(--border-bright); color: var(--text); }
  .btn-small.danger:hover { border-color: var(--accent-rec); color: var(--accent-rec); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    width: 520px;
    max-width: 90vw;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .modal h2 {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .modal-status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 12px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    min-height: 60px;
    line-height: 1.6;
  }

  .modal-status .processing {
    color: var(--accent-b);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-b);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
  }
  .wave-bar {
    width: 3px;
    background: var(--accent-rec);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
    opacity: 0.8;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }
  .wave-bar:nth-child(6) { animation-delay: 0.05s; }
  .wave-bar:nth-child(7) { animation-delay: 0.25s; }
  .wave-bar:nth-child(8) { animation-delay: 0.1s; }
  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 26px; }
  }

  /* EMPTY */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 32px; opacity: 0.4; }
  .empty-state p { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; }

  /* STATUS BAR */
  .status-bar {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 7px 24px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    display: flex;
    gap: 20px;
  }

  .status-bar span { color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">MEMO<span>://</span>LIBRARY</div>
  <div class="header-meta" id="clock">--:--:--</div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Library</div>
      <button class="path-btn active" data-filter="all" onclick="setFilter('all', this)">
        <span class="path-dot dot-all"></span>
        All Memos
        <span class="path-count" id="count-all">0</span>
      </button>
      <button class="path-btn" data-filter="A" onclick="setFilter('A', this)">
        <span class="path-dot dot-a"></span>
        Work
        <span class="path-count" id="count-a">0</span>
      </button>
      <button class="path-btn" data-filter="B" onclick="setFilter('B', this)">
        <span class="path-dot dot-b"></span>
        Research
        <span class="path-count" id="count-b">0</span>
      </button>
      <button class="path-btn" data-filter="C" onclick="setFilter('C', this)">
        <span class="path-dot dot-c"></span>
        Business Ideas
        <span class="path-count" id="count-c">0</span>
      </button>
    </div>

    <div class="record-zone">
      <div class="sidebar-label" style="padding:0 0 4px">Record</div>
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
        <span class="rec-indicator"></span>
        <span id="recordBtnText">Start Recording</span>
      </button>
      <div style="font-size:11px; color:var(--text-muted); line-height:1.6; font-family:var(--mono);">
        Start by saying:<br>
        <span style="color:var(--accent-a)">"Path A:"</span> → Work<br>
        <span style="color:var(--accent-b)">"Path B:"</span> → Research<br>
        <span style="color:var(--accent-c)">"Path C:"</span> → Business Ideas
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div class="main-title" id="mainTitle">
        <span class="badge" style="background:var(--text-muted)"></span>
        ALL MEMOS
      </div>
      <input class="search-box" type="text" placeholder="search memos..." oninput="renderEntries()" id="searchInput">
    </div>

    <div class="entries" id="entries"></div>

    <div class="status-bar">
      <div>TOTAL <span id="stat-total">0</span></div>
      <div>WORK <span id="stat-a">0</span></div>
      <div>RESEARCH <span id="stat-b">0</span></div>
      <div>BUSINESS IDEAS <span id="stat-c">0</span></div>
    </div>
  </main>
</div>

<!-- RECORDING MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">// RECORDING IN PROGRESS</h2>
    <div class="modal-status" id="modalStatus">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        <span style="color:var(--accent-rec); font-size:11px;">Listening...</span>
      </div>
    </div>
    <button class="record-btn recording" onclick="stopRecording()" style="width:100%; margin-top:4px;">
      <span class="rec-indicator"></span> Stop Recording
    </button>
  </div>
</div>

<script>
// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
let memos = JSON.parse(localStorage.getItem('voice_memos') || '[]');
let currentFilter = 'all';
let openId = null;
let mediaRecorder = null;
let audioChunks = [];
let recognition = null;
let isRecording = false;
let liveTranscript = '';

function saveMemos() {
  localStorage.setItem('voice_memos', JSON.stringify(memos));
}

// ───────────────────────────────────────────────
// CLOCK
// ───────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// ───────────────────────────────────────────────
// FILTER
// ───────────────────────────────────────────────
const pathLabels = { A: 'WORK', B: 'RESEARCH', C: 'BUSINESS IDEAS' };
const pathColors = { A: 'var(--accent-a)', B: 'var(--accent-b)', C: 'var(--accent-c)' };

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titleEl = document.getElementById('mainTitle');
  if (f === 'all') {
    titleEl.innerHTML = '<span class="badge" style="background:var(--text-muted)"></span>ALL MEMOS';
  } else {
    titleEl.innerHTML = `<span class="badge" style="background:${pathColors[f]}"></span>${pathLabels[f]}`;
  }
  renderEntries();
}

// ───────────────────────────────────────────────
// RENDER
// ───────────────────────────────────────────────
function renderEntries() {
  const container = document.getElementById('entries');
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = memos.filter(m => {
    if (currentFilter !== 'all' && m.path !== currentFilter) return false;
    if (search && !m.title.toLowerCase().includes(search) && !m.text.toLowerCase().includes(search)) return false;
    return true;
  });

  // sort newest first
  filtered.sort((a,b) => b.ts - a.ts);

  // update counts
  document.getElementById('count-all').textContent = memos.length;
  document.getElementById('count-a').textContent = memos.filter(m=>m.path==='A').length;
  document.getElementById('count-b').textContent = memos.filter(m=>m.path==='B').length;
  document.getElementById('count-c').textContent = memos.filter(m=>m.path==='C').length;
  document.getElementById('stat-total').textContent = memos.length;
  document.getElementById('stat-a').textContent = memos.filter(m=>m.path==='A').length;
  document.getElementById('stat-b').textContent = memos.filter(m=>m.path==='B').length;
  document.getElementById('stat-c').textContent = memos.filter(m=>m.path==='C').length;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">◎</div>
        <p>NO MEMOS FOUND</p>
        <p style="font-size:10px; opacity:0.5;">Record your first memo →</p>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(m => {
    const d = new Date(m.ts);
    const key = d.toLocaleDateString('en-GB', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  let html = '';
  for (const [date, items] of Object.entries(groups)) {
    html += `<div class="date-group-label">${date}</div>`;
    items.forEach(m => {
      const time = new Date(m.ts).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
      const tagClass = {A:'tag-a', B:'tag-b', C:'tag-c'}[m.path];
      const pathName = {A:'WORK', B:'RESEARCH', C:'BUSINESS IDEAS'}[m.path];
      const isOpen = openId === m.id;
      html += `
        <div class="entry-card${isOpen?' open':''}" onclick="toggleEntry('${m.id}')">
          <div>
            <div class="entry-path-tag ${tagClass}">
              <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>
              ${pathName}
            </div>
            <div class="entry-title">${escHtml(m.title)}</div>
            ${!isOpen ? `<div class="entry-preview">${escHtml(m.text.substring(0,140))}${m.text.length>140?'…':''}</div>` : ''}
          </div>
          <div class="entry-meta">${time}</div>
          ${isOpen ? `
            <div class="entry-expand">${escHtml(m.text)}</div>
            <div class="entry-actions">
              <button class="btn-small" onclick="copyMemo('${m.id}', event)">COPY TEXT</button>
              <button class="btn-small" onclick="downloadMemo('${m.id}', event)">DOWNLOAD</button>
              <button class="btn-small danger" onclick="deleteMemo('${m.id}', event)">DELETE</button>
            </div>
          ` : ''}
        </div>`;
    });
  }

  container.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleEntry(id) {
  openId = openId === id ? null : id;
  renderEntries();
}

function copyMemo(id, e) {
  e.stopPropagation();
  const m = memos.find(x=>x.id===id);
  if (m) navigator.clipboard.writeText(m.text);
}

function downloadMemo(id, e) {
  e.stopPropagation();
  const m = memos.find(x=>x.id===id);
  if (!m) return;
  const blob = new Blob([`MEMO // ${m.title}\nPath: ${pathLabels[m.path]}\nDate: ${new Date(m.ts).toLocaleString()}\n\n${m.text}`], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = sanitizeFilename(m.title) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function deleteMemo(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this memo?')) return;
  memos = memos.filter(x=>x.id!==id);
  if (openId===id) openId=null;
  saveMemos();
  renderEntries();
}

function sanitizeFilename(str) {
  return str.replace(/[^a-z0-9_\-\s]/gi,'').replace(/\s+/g,'_').toLowerCase().substring(0,60);
}

// ───────────────────────────────────────────────
// RECORDING — Web Speech API
// ───────────────────────────────────────────────
function toggleRecording() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Your browser does not support the Web Speech API.\nPlease use Chrome or Edge for voice recording.\n\nAlternatively, you can type your memo below using the manual input (double-click any empty area).');
    showManualInput();
    return;
  }

  liveTranscript = '';
  isRecording = true;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    liveTranscript += final;
    document.getElementById('modalStatus').innerHTML = `
      <div style="line-height:1.7; font-size:11px;">
        <span style="color:var(--text-dim)">${escHtml(liveTranscript)}</span>
        <span style="color:var(--text-muted)">${escHtml(interim)}</span>
      </div>`;
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.warn('Speech recognition error:', e.error);
    if (e.error === 'not-allowed') {
      isRecording = false;
      if (recognition) { recognition.onend = null; recognition.stop(); }
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('recordBtnText').textContent = 'Start Recording';
      document.getElementById('modalOverlay').classList.remove('show');
      alert('Microphone access denied.\nPlease allow microphone access in your browser settings and try again.');
      return;
    }
    document.getElementById('modalStatus').innerHTML = `
      <div style="color:var(--accent-rec); font-size:11px; padding:4px 0;">
        Recognition error: ${e.error}. Tap Stop and try again.
      </div>`;
  };

  recognition.onend = () => {
    if (isRecording) {
      setTimeout(() => {
        if (isRecording) {
          try { recognition.start(); } catch(err) { console.warn('Restart failed:', err); }
        }
      }, 150);
    }
  };

  recognition.start();
  document.getElementById('recordBtn').classList.add('recording');
  document.getElementById('recordBtnText').textContent = 'Stop Recording';
  document.getElementById('modalTitle').textContent = '// RECORDING IN PROGRESS';
  document.getElementById('modalOverlay').classList.add('show');
}

function stopRecording() {
  isRecording = false;
  if (recognition) { recognition.onend = null; recognition.stop(); }

  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('recordBtnText').textContent = 'Start Recording';
  document.getElementById('modalTitle').textContent = '// PROCESSING...';

  const transcript = liveTranscript.trim();
  if (!transcript) {
    document.getElementById('modalOverlay').classList.remove('show');
    return;
  }

  processTranscript(transcript);
}

// ───────────────────────────────────────────────
// MANUAL INPUT FALLBACK
// ───────────────────────────────────────────────
function showManualInput() {
  const text = prompt('Enter your memo text:\n(Start with "Path A:", "Path B:", or "Path C:")');
  if (text) processTranscript(text);
}

// Double-click empty entries area to trigger manual
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('entries').addEventListener('dblclick', (e) => {
    if (e.target === e.currentTarget) showManualInput();
  });
});

// ───────────────────────────────────────────────
// SAVE MEMO + AUTO-DOWNLOAD
// ───────────────────────────────────────────────
function saveMemoAndDownload(path, title, text) {
  const memo = {
    id: 'memo_' + Date.now(),
    path,
    title,
    text,
    ts: Date.now()
  };
  memos.unshift(memo);
  saveMemos();
  document.getElementById('modalOverlay').classList.remove('show');
  openId = memo.id;
  renderEntries();

  // Auto-download as .txt file
  const dateStr = new Date(memo.ts).toLocaleString();
  const categoryName = {A:'Work', B:'Research', C:'Business Ideas'}[path];
  const content = `MEMO // ${title}\nCategory: ${categoryName}\nDate: ${dateStr}\n\n${text}`;
  const blob = new Blob([content], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = sanitizeFilename(title) + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ───────────────────────────────────────────────
// PROCESS TRANSCRIPT
// ───────────────────────────────────────────────
function processTranscript(transcript) {
  // Detect path
  let path = null;
  let cleanText = transcript;

  const pathMatch = transcript.match(/^path\s*([abc])[\s:,.]*/i);
  if (pathMatch) {
    path = pathMatch[1].toUpperCase();
    cleanText = transcript.slice(pathMatch[0].length).trim();
  }

  if (!path) {
    // Ask user
    const chosen = prompt(`No path detected in:\n"${transcript.substring(0,80)}..."\n\nEnter path (A=Work, B=Research, C=Business Ideas):`);
    if (!chosen || !['A','B','C'].includes(chosen.toUpperCase())) {
      document.getElementById('modalOverlay').classList.remove('show');
      return;
    }
    path = chosen.toUpperCase();
    cleanText = transcript;
  }

  // Show processing state
  document.getElementById('modalStatus').innerHTML = `
    <div class="processing">
      <div class="spinner"></div>
      Generating title with AI...
    </div>`;

  generateTitle(cleanText, path).then(title => {
    saveMemoAndDownload(path, title, cleanText);
  }).catch(() => {
    const title = cleanText.split(' ').slice(0,6).join(' ') + (cleanText.split(' ').length > 6 ? '…' : '');
    saveMemoAndDownload(path, title, cleanText);
  });
}

// ───────────────────────────────────────────────
// AI TITLE GENERATION
// ───────────────────────────────────────────────
async function generateTitle(text, path) {
  const categoryName = {A:'Work', B:'Research', C:'Business Ideas'}[path];
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `You are a title generator for voice memos in the "${categoryName}" category.\n\nGiven this voice memo text, generate a SHORT, SPECIFIC, DESCRIPTIVE title (4-8 words max). Be concise and informative. Return ONLY the title text, nothing else.\n\nMemo text:\n${text.substring(0, 800)}`
      }]
    })
  });

  const data = await response.json();
  const raw = data.content?.[0]?.text?.trim() || '';
  // strip quotes if present
  return raw.replace(/^["']|["']$/g, '').trim() || text.split(' ').slice(0,6).join(' ');
}

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
renderEntries();
</script>
