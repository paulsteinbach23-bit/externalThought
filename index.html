<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MEMO — Voice Library</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" id="themeColorMeta" content="#0c1a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MEMO">
<link rel="apple-touch-icon" href="icon_ET.png">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="Menü">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">MEMO<span>://</span>LIBRARY</div>
  </div>
  <div class="header-right">
    <div class="header-meta" id="clock">--:--:--</div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Theme wechseln">
      <span class="toggle-icon moon">◐</span>
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon sun">☀</span>
    </button>
  </div>
</header>

<!-- Mobile sidebar backdrop -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Bibliothek</div>
      <button class="path-btn active" data-filter="all" onclick="setFilter('all', this)">
        <span class="path-dot dot-all"></span>
        Alle Memos
        <span class="path-count" id="count-all">0</span>
      </button>
      <button class="path-btn" data-filter="A" onclick="setFilter('A', this)">
        <span class="path-dot dot-a"></span>
        Work
        <span class="path-count" id="count-a">0</span>
      </button>
      <button class="path-btn" data-filter="B" onclick="setFilter('B', this)">
        <span class="path-dot dot-b"></span>
        Research
        <span class="path-count" id="count-b">0</span>
      </button>
      <button class="path-btn" data-filter="C" onclick="setFilter('C', this)">
        <span class="path-dot dot-c"></span>
        Business Ideas
        <span class="path-count" id="count-c">0</span>
      </button>
      <!-- Dynamic custom paths injected here -->
      <div id="customPathList"></div>
      <button class="new-path-btn" onclick="openNewPathModal()">+ Neuer Pfad</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Category tabs -->
    <div class="category-tabs" id="categoryTabs">
      <button class="cat-tab active" data-filter="all" onclick="setFilter('all', this)">
        <span class="path-dot dot-all"></span>Alle
      </button>
      <button class="cat-tab" data-filter="A" onclick="setFilter('A', this)">
        <span class="path-dot dot-a"></span>Work
      </button>
      <button class="cat-tab" data-filter="B" onclick="setFilter('B', this)">
        <span class="path-dot dot-b"></span>Research
      </button>
      <button class="cat-tab" data-filter="C" onclick="setFilter('C', this)">
        <span class="path-dot dot-c"></span>Business
      </button>
      <!-- Dynamic custom category tabs injected here -->
      <span id="customCatTabs"></span>
    </div>

    <div class="main-header">
      <div class="main-title" id="mainTitle">
        <span class="badge" style="background:var(--text-muted)"></span>
        ALLE MEMOS
      </div>
      <div class="search-row">
        <input class="search-box" type="text" placeholder="Suchen …" oninput="renderEntries()" id="searchInput">
        <button class="sort-toggle" id="sortToggle" onclick="toggleSort()">↓ NEU</button>
      </div>
    </div>

    <div class="entries" id="entries"></div>

    <div class="status-bar">
      <div>GESAMT <span id="stat-total">0</span></div>
      <div>WORK <span id="stat-a">0</span></div>
      <div>RESEARCH <span id="stat-b">0</span></div>
      <div>BUSINESS <span id="stat-c">0</span></div>
    </div>
  </main>
</div>

<!-- Floating Action Button -->
<button class="fab" id="fab" onclick="onFabClick()" aria-label="Aufnahme">
  <svg id="fabIcon" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>
  <svg id="fabStopIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
    <rect x="4" y="4" width="16" height="16" rx="3"/>
  </svg>
</button>

<!-- RECORDING MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">// AUFNAHME LÄUFT</h2>
    <div class="modal-status" id="modalStatus">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        <span style="color:var(--accent-rec); font-size:11px; font-family:var(--mono);">Zuhören …</span>
      </div>
    </div>
    <textarea class="modal-review-textarea" id="reviewTextarea" style="display:none" placeholder="Erkannter Text — hier bearbeiten …"></textarea>
    <button class="record-btn recording" id="modalStopBtn" onclick="stopRecording()" style="width:100%; margin-top:4px;">
      <span class="rec-indicator"></span> Aufnahme stoppen
    </button>
    <button class="record-btn" id="modalConfirmBtn" onclick="confirmAndProcess()" style="display:none; width:100%; margin-top:4px; border-color:var(--accent-a); color:var(--accent-a);">
      Speichern →
    </button>
  </div>
</div>

<!-- PRE-RECORDING PATH OVERLAY -->
<div class="record-path-overlay" id="recordPathOverlay">
  <div class="record-path-header">
    <span class="record-path-title">// KATEGORIE WÄHLEN</span>
    <button class="editor-nav-btn" onclick="pickRecordPath(null)">Abbrechen</button>
  </div>
  <div class="record-path-grid">
    <button class="record-path-btn rp-a" onclick="pickRecordPath('A')">
      <span class="rp-letter">A</span>
      <span class="rp-label">Work</span>
    </button>
    <button class="record-path-btn rp-b" onclick="pickRecordPath('B')">
      <span class="rp-letter">B</span>
      <span class="rp-label">Research</span>
    </button>
    <button class="record-path-btn rp-c" onclick="pickRecordPath('C')">
      <span class="rp-letter">C</span>
      <span class="rp-label">Business Ideas</span>
    </button>
    <!-- Dynamic custom record path buttons injected here -->
    <div id="customRecordPaths"></div>
  </div>
</div>

<!-- PATH PICKER MODAL -->
<div class="modal-overlay" id="pathPickerOverlay">
  <div class="modal" style="width:420px;">
    <h2>// KATEGORIE WÄHLEN</h2>
    <p class="path-picker-hint" id="pathPickerHint"></p>
    <div class="path-picker-btns">
      <button class="path-picker-option" onclick="pickPath('A')">
        <span class="path-dot dot-a"></span>
        <span class="path-picker-label">A — Work</span>
      </button>
      <button class="path-picker-option" onclick="pickPath('B')">
        <span class="path-dot dot-b"></span>
        <span class="path-picker-label">B — Research</span>
      </button>
      <button class="path-picker-option" onclick="pickPath('C')">
        <span class="path-dot dot-c"></span>
        <span class="path-picker-label">C — Business Ideas</span>
      </button>
      <!-- Dynamic custom path options injected here -->
      <div id="customPickerPaths"></div>
    </div>
    <button class="btn-small" style="align-self:flex-start; margin-top:4px;" onclick="pickPath(null)">Abbrechen</button>
  </div>
</div>

<!-- NEW PATH MODAL -->
<div class="modal-overlay" id="newPathOverlay">
  <div class="modal" style="width:360px; gap:14px;">
    <h2>// NEUER PFAD</h2>
    <input class="new-path-input" id="newPathInput" type="text" placeholder="Pfadname …" maxlength="40"
      onkeydown="if(event.key==='Enter') saveNewPath()"
      oninput="document.getElementById('newPathError').textContent=''; updateNewPathPreview(this.value)">
    <div class="new-path-preview" id="newPathPreview"></div>
    <p class="new-path-error" id="newPathError"></p>
    <div style="display:flex; gap:8px;">
      <button class="record-btn" onclick="saveNewPath()" style="flex:1; border-color:var(--accent-a); color:var(--accent-a); padding:10px;">Erstellen →</button>
      <button class="btn-small" onclick="closeNewPathModal()" style="padding:10px 16px;">Abbrechen</button>
    </div>
  </div>
</div>

<!-- EDITOR OVERLAY -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-container">

    <div class="editor-nav">
      <button class="editor-nav-btn" onclick="closeEditor()">← Zurück</button>
      <span class="editor-nav-title">// MEMO BEARBEITEN</span>
      <button class="editor-nav-btn editor-save-btn" onclick="saveEditor()">Speichern</button>
    </div>

    <div class="editor-toolbar">
      <select class="toolbar-select" id="fontFamilySelect" onchange="applyFontFamily(this.value)">
        <option value="-apple-system, BlinkMacSystemFont, sans-serif">System</option>
        <option value="Georgia, 'Times New Roman', serif">Serif</option>
        <option value="'SF Mono', 'Courier New', monospace">Monospace</option>
        <option value="'Helvetica Neue', Arial, sans-serif">Helvetica</option>
      </select>
      <select class="toolbar-select toolbar-select--size" id="fontSizeSelect" onchange="applyFontSize(this.value)">
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15" selected>15</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="20">20</option>
        <option value="24">24</option>
        <option value="28">28</option>
        <option value="32">32</option>
      </select>
      <button class="toolbar-btn" onmousedown="event.preventDefault(); document.execCommand('bold')" title="Fett"><b>B</b></button>
      <button class="toolbar-btn" onmousedown="event.preventDefault(); document.execCommand('italic')" title="Kursiv"><i>I</i></button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn toolbar-btn--label" onclick="insertEditorTable()">＋ Tabelle</button>
      <div class="toolbar-spacer"></div>
      <span class="editor-path-tag" id="editorPathTag"></span>
    </div>

    <div class="editor-body">
      <div class="editor-title-input" id="editorTitle" contenteditable="true" placeholder="Titel …"></div>
      <div class="editor-content" id="editorContent" contenteditable="true" placeholder="Inhalt …"></div>
    </div>

    <div class="llm-panel">
      <div class="llm-panel-header" onclick="toggleLLMPanel()">
        <span class="llm-panel-title">// LLM PROMPT</span>
        <span class="llm-panel-toggle" id="llmToggle">▾</span>
      </div>
      <div class="llm-panel-body">
        <p class="llm-description">Prompt mit Memo-Inhalt — direkt in ein KI-Modell deiner Wahl einfügen</p>
        <textarea class="llm-textarea" id="llmPrompt"></textarea>
        <button class="llm-copy-btn" onclick="copyLLMPrompt()">Prompt kopieren</button>
      </div>
    </div>

  </div>
</div>

<!-- DETAIL VIEW -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-container">
    <div class="detail-nav">
      <button class="editor-nav-btn" onclick="navigateBack()">← Zurück</button>
      <span class="detail-nav-path entry-path-tag" id="detailNavPath"></span>
    </div>
    <div class="detail-body">
      <div class="detail-timestamp" id="detailTimestamp"></div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-text" id="detailText"></div>
    </div>
    <div class="detail-actions">
      <button class="btn-small" id="detailEditBtn">BEARBEITEN</button>
      <button class="btn-small" id="detailCopyBtn">KOPIEREN</button>
      <button class="btn-small" id="detailDownloadBtn">DOWNLOAD</button>
      <button class="btn-small danger" id="detailDeleteBtn">LÖSCHEN</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
